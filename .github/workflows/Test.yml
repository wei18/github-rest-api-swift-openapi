name: Test

on: 
  push:
    branches:
      - main
    paths:
      - 'Sources/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest
        swift:
          - 6
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: ./.github/composites/setup
        with:
          swift: ${{ matrix.swift }}
          os: ${{ matrix.os }}
      
      - run: swift build
      - run: swift test
