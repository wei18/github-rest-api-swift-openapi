name: Test

on: 
  push:
    branches:
      - main
    paths-ignore:
      - 'Submodule/**'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  test:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/composites/setup
        with:
          os: ${{ matrix.os }}
      
      - run: swift test
